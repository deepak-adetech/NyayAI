services:
  ollama:
    image: ollama/ollama:latest
    container_name: nyaya_ollama
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - n8n_default
    # GPU support (uncomment if server has NVIDIA GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  whisper:
    # Self-hosted speech-to-text. Auto-detects spoken language (Hindi, Tamil,
    # Telugu, Bengali, etc.) and returns text in the native script. CPU-only.
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: nyaya_whisper
    restart: always
    environment:
      - ASR_ENGINE=faster_whisper
      - ASR_MODEL=small            # tiny|base|small|medium|large-v3 (accuracy vs CPU speed)
    volumes:
      - whisper_cache:/root/.cache
    networks:
      - n8n_default

  nyayasahayak:
    image: nyayasahayak:latest
    container_name: nyayasahayak
    restart: always
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LEGAL_LLM_MODEL=hf.co/invincibleambuj/Ambuj-Tripathi-Indian-Legal-Llama-GGUF:Q4_K_M
      - WHISPER_URL=http://whisper:9000
    volumes:
      - nyaya_storage:/app/storage
    depends_on:
      - ollama
      - whisper
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nyayasahayak.rule=Host(`case.ade-technologies.com`)"
      - "traefik.http.routers.nyayasahayak.tls=true"
      - "traefik.http.routers.nyayasahayak.entrypoints=web,websecure"
      - "traefik.http.routers.nyayasahayak.tls.certresolver=myhttpchallenge"
      - "traefik.http.services.nyayasahayak.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.nyaya-headers.headers.SSLRedirect=true"
      - "traefik.http.middlewares.nyaya-headers.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.nyaya-headers.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.nyaya-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.nyaya-headers.headers.forceSTSHeader=true"
      - "traefik.http.routers.nyayasahayak.middlewares=nyaya-headers@docker"

volumes:
  nyaya_storage:
  ollama_models:
  whisper_cache:

networks:
  n8n_default:
    external: true
